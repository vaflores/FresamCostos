<mat-nav-list>
    <a mat-list-item routerLink="/dashboard">
        <mat-icon>dashboard</mat-icon>
        <span>Dashboard</span>
    </a>
    @if (perfil(); as perfil) {
        @for (modulo of perfil.modulos; track modulo.moduloId) {
            <mat-expansion-panel hideToggle>
                <mat-expansion-panel-header>
                    <mat-panel-title>
                        <mat-icon>
                            {{ modulo.icono }}
                        </mat-icon>
                        {{ modulo.nombre }}
                    </mat-panel-title>
                </mat-expansion-panel-header>
                @for (pantalla of modulo.pantallas; track pantalla.pantallaId) {
                    <a mat-list-item [routerLink]="pantalla.ruta">
                        <mat-icon>{{ pantalla.icono }}</mat-icon>
                        <span>{{ pantalla.nombre }}</span>
                    </a>
                }
            </mat-expansion-panel>
        }
    }
</mat-nav-list>
