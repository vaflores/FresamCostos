<div class="login-container">

  <mat-card class="login-card">

    <mat-card-header class="login-header">

        <mat-card-title>
            Fresam
        </mat-card-title>

        <mat-card-subtitle>
            Sistema Integral de Costos
        </mat-card-subtitle>

    </mat-card-header>

    <mat-card-content>

      <form
        [formGroup]="loginForm"
        (ngSubmit)="probarLogin()">

        <mat-form-field
          appearance="outline"
          class="full-width">

          <mat-label>Usuario</mat-label>

          <input
            matInput
            formControlName="usuario">

          <mat-icon matSuffix>
            person
          </mat-icon>

        </mat-form-field>

        <mat-form-field
          appearance="outline"
          class="full-width">

          <mat-label>Contraseña</mat-label>

          <input
            matInput
            type="password"
            formControlName="password">

          <mat-icon matSuffix>
            lock
          </mat-icon>

        </mat-form-field>
        @if (errorMessage) {

            <div class="error-message">

                {{ errorMessage }}

            </div>

        }

        <button
            mat-raised-button
            color="primary"
            class="full-width"
            type="submit"
            [disabled]="isLoading">

            @if (!isLoading) {

                <span>
                Iniciar Sesión
                </span>

            }

            @if (isLoading) {

                <mat-spinner
                diameter="20">
                </mat-spinner>

            }

        </button>

      </form>

    </mat-card-content>

  </mat-card>

</div>
